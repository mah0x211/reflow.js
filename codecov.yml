# See https://docs.codecov.com/docs/codecov-yaml
coverage:
  status:
    project:
      default:
        target: auto
        # Allow small dips (<1 %) so that adding a feature does not fail the
        # status check as long as the overall level stays healthy. Larger
        # regressions still surface as a Codecov failure.
        threshold: 1%
        informational: false
    patch:
      default:
        target: 90%
        threshold: 5%
        informational: false

# Keep the PR comment focused on what changed.
comment:
  layout: "reach, diff, files"
  behavior: default
  require_changes: false
